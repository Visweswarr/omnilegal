  # ── Classic arbitrations ─────────────────────────────────────────────────
  - canonical_name: "Tinoco Arbitration"
    aliases: ["Tinoco Case", "Great Britain v Costa Rica", "Great Britain v. Costa Rica",
              "Britain v Costa Rica"]
    court: "Arbitration (Taft)"
    year: 1923
    tags: ["statehood_and_recognition", "government_recognition", "de_facto_government",
           "state_succession", "general_international_law"]
    landmark_boost: 1.0
    summary: >
      Arbitration between Great Britain and Costa Rica decided by Chief Justice Taft (1923).
      Costa Rica repudiated contracts made by the Tinoco regime arguing it was a de facto
      government not recognised by many states. Taft held that non-recognition by other states
      does not extinguish the legal continuity of the state; a de facto government's acts bind
      its successor unless the successor expressly repudiates them. Established the doctrine that
      non-recognition does not retroactively invalidate governmental acts.

